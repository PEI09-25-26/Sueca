<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codigo de verificacao</title>
  <style>
    body { margin: 0; padding: 0; background: #0f172a; font-family: Arial, sans-serif; color: #e2e8f0; }
    .container { max-width: 560px; margin: 0 auto; padding: 24px; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 24px; }
    .title { font-size: 24px; margin: 0 0 12px 0; color: #f8fafc; }
    .text { font-size: 16px; line-height: 1.5; color: #cbd5e1; margin: 0 0 16px 0; }
    .code { display: block; text-align: center; font-size: 36px; letter-spacing: 8px; font-weight: 700; color: #22c55e; background: #0b1220; border: 1px dashed #22c55e; border-radius: 10px; padding: 16px; margin: 18px 0; }
    .footer { margin-top: 16px; font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 class="title">Verificacao de Email</h1>
      <p class="text">Ola, {{USERNAME}}.</p>
      <p class="text">Usa o codigo abaixo na app para confirmar o teu email:</p>
      <span class="code">{{CODE}}</span>
      <p class="text">Este codigo expira em 10 minutos.</p>
      <p class="footer">Se nao pediste este codigo, ignora este email.</p>
    </div>
  </div>
</body>
</html>
